name: Build HapticAudio Debug APK

# 触发条件：当你推送到 main 分支，或者在网页端手动点击时触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取源代码
        uses: actions/checkout@v4

      - name: 2. 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 4. 编译 Debug 版本 APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 5. 提取并上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: HapticAudio-Debug-APK
          # 提取 Debug 包的固定路径
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
