name: Build HapticAudio Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取源代码
        uses: actions/checkout@v4

      - name: 2. 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 注意：这里删除了 cache: gradle，避免纯手搓无脚本时缓存报错

      - name: 3. 魔法：自动生成 Gradle Wrapper (补全缺失的执行文件)
        run: gradle wrapper --gradle-version 8.5

      - name: 4. 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 5. 编译 Debug 版本 APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 6. 提取并上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: HapticAudio-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
